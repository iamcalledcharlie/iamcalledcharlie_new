<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #gameCanvas {
            border: 2px solid #ddd;
            background: linear-gradient(180deg, #060b17 0%, #0d1a33 100%);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.85);
            border: 2px solid #555;
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            width: min(90%, 380px);
            z-index: 10;
        }
        .overlay h1 {
            margin-bottom: 1rem;
            color: #ffdb58;
            font-size: 1.6rem;
        }
        .overlay p {
            margin-bottom: 1.5rem;
            font-size: 0.75rem;
            line-height: 1.4;
        }
        .overlay button {
            padding: 0.8rem 1.4rem;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.85rem;
            background-color: #ffdb58;
            color: #111;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }
        .overlay button:hover {
            background-color: #f1c232;
            transform: translateY(-2px);
        }
        .game-info {
            position: absolute;
            top: 1rem;
            left: 1rem;
            display: flex;
            gap: 1rem;
            z-index: 10;
            font-size: 0.75rem;
        }
        .info-box {
            background: rgba(0,0,0,0.7);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 0.6rem 0.9rem;
        }
        .instructions-box {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            font-size: 0.7rem;
            z-index: 10;
            width: min(90%, 520px);
        }
        .instructions-box kbd {
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 0.2rem 0.4rem;
            margin: 0 0.2rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="game-info">
        <div class="info-box">Score: <span id="score">0</span></div>
        <div class="info-box">Lives: <span id="lives">3</span></div>
    </div>
    <div class="instructions-box">
        Use <kbd>←</kbd> and <kbd>→</kbd> or move the mouse to steer the paddle. Destroy all bricks and avoid losing all lives.
    </div>
    <div id="startOverlay" class="overlay">
        <h1>Brick Breaker</h1>
        <p>Smash all the bricks with your ball. Catch the ball with your paddle and keep the action going!</p>
        <button id="startButton">Start Game</button>
    </div>
    <div id="gameOverOverlay" class="overlay" style="display:none;">
        <h1>Game Over</h1>
        <p>Your score: <span id="finalScore">0</span></p>
        <button id="restartButton">Play Again</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startOverlay = document.getElementById('startOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const startButton = document.getElementById('startButton');
        const restartButton = document.getElementById('restartButton');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const finalScore = document.getElementById('finalScore');

        const paddle = { width: 120, height: 14, x: canvas.width / 2 - 60, y: canvas.height - 40, speed: 8 };
        const ball = { x: canvas.width / 2, y: canvas.height - 60, radius: 8, speed: 5, dx: 2.5, dy: -2.5 };
        const brick = { rows: 5, cols: 9, width: 72, height: 20, padding: 10, offsetTop: 80, offsetLeft: 28 };
        const colors = ['#ff6b6b', '#f8b84f', '#4ad9ff', '#7cff8e', '#c97bff'];

        let bricks = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;
        let keys = {};

        function createBricks() {
            bricks = [];
            for (let row = 0; row < brick.rows; row++) {
                bricks[row] = [];
                for (let col = 0; col < brick.cols; col++) {
                    const x = col * (brick.width + brick.padding) + brick.offsetLeft;
                    const y = row * (brick.height + brick.padding) + brick.offsetTop;
                    bricks[row][col] = { x, y, status: 1, color: colors[row % colors.length] };
                }
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 60;
            ball.dx = 2.5 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -2.5;
        }

        function resetGame() {
            paddle.x = canvas.width / 2 - paddle.width / 2;
            score = 0;
            lives = 3;
            scoreDisplay.textContent = score;
            livesDisplay.textContent = lives;
            createBricks();
            resetBall();
            gameOverOverlay.style.display = 'none';
        }

        function drawPaddle() {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffdb58';
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            bricks.forEach((row) => {
                row.forEach((b) => {
                    if (b.status === 1) {
                        ctx.fillStyle = b.color;
                        ctx.fillRect(b.x, b.y, brick.width, brick.height);
                        ctx.strokeStyle = '#111';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(b.x, b.y, brick.width, brick.height);
                    }
                });
            });
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#060b17');
            gradient.addColorStop(1, '#0d1a33');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function collisionDetection() {
            bricks.forEach((row) => {
                row.forEach((b) => {
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brick.width &&
                            ball.y - ball.radius > b.y && ball.y - ball.radius < b.y + brick.height) {
                            ball.dy *= -1;
                            b.status = 0;
                            score += 10;
                            scoreDisplay.textContent = score;
                        }
                    }
                });
            });
        }

        function update() {
            if (!gameRunning) return;

            ball.x += ball.dx;
            ball.y += ball.dy;

            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx *= -1;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            if (ball.y + ball.radius > canvas.height) {
                lives -= 1;
                livesDisplay.textContent = lives;
                if (lives <= 0) {
                    endGame();
                } else {
                    resetBall();
                }
            }

            if (ball.x > paddle.x && ball.x < paddle.x + paddle.width && ball.y + ball.radius > paddle.y) {
                ball.dy = -Math.abs(ball.dy);
                const hitPoint = ball.x - (paddle.x + paddle.width / 2);
                ball.dx = hitPoint * 0.12;
                ball.dy -= 0.2;
            }

            if (keys['ArrowLeft'] && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
            if (keys['ArrowRight'] && paddle.x + paddle.width < canvas.width) {
                paddle.x += paddle.speed;
            }

            collisionDetection();

            if (bricks.flat().every((b) => b.status === 0)) {
                ball.dx *= 1.1;
                ball.dy *= 1.1;
                createBricks();
                resetBall();
            }
        }

        function draw() {
            drawBackground();
            drawBricks();
            drawPaddle();
            drawBall();
        }

        function loop() {
            update();
            draw();
            animationId = requestAnimationFrame(loop);
        }

        function startGame() {
            resetGame();
            startOverlay.style.display = 'none';
            gameRunning = true;
            cancelAnimationFrame(animationId);
            loop();
        }

        function endGame() {
            gameRunning = false;
            finalScore.textContent = score;
            gameOverOverlay.style.display = 'block';
        }

        document.addEventListener('keydown', (event) => {
            keys[event.key] = true;
            if (event.key === 'Enter' && !gameRunning && startOverlay.style.display === 'none') {
                startGame();
            }
        });

        document.addEventListener('keyup', (event) => {
            keys[event.key] = false;
        });

        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            paddle.x = Math.min(Math.max(mouseX - paddle.width / 2, 0), canvas.width - paddle.width);
        });

        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', startGame);

        resetGame();
    </script>
</body>
</html>

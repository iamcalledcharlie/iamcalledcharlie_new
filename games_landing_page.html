<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Games</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding-bottom: 6rem;
            font-family: 'Press Start 2P', cursive;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border-radius: 1rem;
            background-color: rgba(0, 0, 0, 0.8);
            max-width: 80%;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #ffdb58;
            text-shadow: 0 0 8px rgba(255, 219, 88, 0.8);
        }
        p {
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            color: #eee;
        }
        .game-link {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 0.5rem;
            text-decoration: none;
        }
        .game-link:hover {
            background-color: #367c39;
        }
        .link-button,
        .install-button {
            color: #fff;
            text-decoration: none;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.95rem;
            margin: 0.25rem;
            padding: 0.65rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background-color: rgba(255, 255, 255, 0.08);
            transition: background-color 0.25s ease, transform 0.25s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .link-button:hover,
        .install-button:hover {
            background-color: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }
        .bottom-controls {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 0.75rem 1.25rem;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="bg-black text-white">
    <div class="container">
        <h1>Fun Games</h1>
        <p>Welcome to our fun games page!  Click a game below to play!</p>
        <a href="space_explorer.html" class="game-link">Space Explorer</a>
        <a href="pong.html" class="game-link">Atari 2600 Pong</a>
        <a href="pitfall.html" class="game-link">Pitfall Adventure</a>
        <a href="breakout.html" class="game-link">Brick Breaker</a>
        <a href="escape_key.html" class="game-link">Escape the Maze</a>
    </div>
    <div class="bottom-controls">
        <a href="index.html" class="link-button">Home</a>
        <a href="games_landing_page.html" class="link-button">Games</a>
        <a href="breakout.html" class="link-button">Breakout</a>
        <a href="escape_key.html" class="link-button">Escape</a>
        <button id="installButton" class="install-button hidden">Install App</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch((error) => {
                console.error('Service Worker registration failed:', error);
            });
        }

        let deferredPrompt;
        const installButton = document.getElementById('installButton');

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredPrompt = event;
            if (installButton) installButton.classList.remove('hidden');
        });

        if (installButton) {
            installButton.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const choiceResult = await deferredPrompt.userChoice;
                if (choiceResult.outcome === 'accepted') {
                    installButton.textContent = 'Installed';
                }
                installButton.classList.add('hidden');
                deferredPrompt = null;
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- ensure proper mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitfall Mobile</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    /* responsive canvas: full width up to 800px, height auto */
    canvas {
      background: linear-gradient(to bottom, #87ceeb 0%, #68c8f9 60%, #654321 61%, #432a10 100%);
      border: 4px solid #222;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
      image-rendering: pixelated;
      width: 100%;
      max-width: 800px;
      height: auto;
      touch-action: none; /* disable scrolling when touching canvas */
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #fff;
      font: 20px 'Press Start 2P', monospace;
      text-shadow: 2px 2px 0 #000;
    }
    .link-button,
    .install-button {
      color: #fff;
      text-decoration: none;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.95rem;
      margin: 0.25rem;
      padding: 0.65rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background-color: rgba(255, 255, 255, 0.08);
      transition: background-color 0.25s ease, transform 0.25s ease;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .link-button:hover,
    .install-button:hover {
      background-color: rgba(255, 255, 255, 0.18);
      transform: translateY(-1px);
    }
    .bottom-controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 1rem 0.75rem 1.25rem;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(10px);
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="400"></canvas>
  <div id="ui">Score: 0</div>

  <audio id="jumpSound" src="assets/jump.mp3" preload="auto"></audio>
  <audio id="collectSound" src="assets/collect.mp3" preload="auto"></audio>

  <div class="bottom-controls">
      <a href="index.html" class="link-button">Home</a>
      <a href="games_landing_page.html" class="link-button">Games</a>
      <a href="breakout.html" class="link-button">Breakout</a>
      <a href="escape_key.html" class="link-button">Escape</a>
      <button id="installButton" class="install-button hidden">Install App</button>
  </div>

  <script>
  const canvas = document.getElementById('gameCanvas');
  const ctx    = canvas.getContext('2d');
  const ui     = document.getElementById('ui');
  const jumpSound    = document.getElementById('jumpSound');
  const collectSound = document.getElementById('collectSound');

  const W = canvas.width, H = canvas.height;
  const groundY = H - 50;

  // TUNED PHYSICS
  const scrollSpeed = 2.5;
  const gravity     = 0.6;
  const jumpVel     = -16;

  let player, holes, treasures, particles, clouds;
  let keys = {}, score = 0, gameOver = false;

  function rnd(min, max){ return min + Math.random()*(max-min); }

  function init() {
    player = { x:100, y:groundY-50, w:40, h:50, vy:0, onGround:true, frame:0, frameDir:1 };
    holes = []; treasures = []; particles = []; clouds = [];
    score = 0; gameOver = false;
    ui.textContent = 'Score: 0';

    // spawn holes & treasures
    let x = W;
    for (let i = 0; i < 4; i++) {
      x += rnd(300, 450);
      let w = rnd(60, 110);
      holes.push({ x, w });
      if (Math.random() < 0.4) treasures.push({ x: x+w/2, y: groundY-60, size:24, angle:0 });
    }
    // clouds
    for (let i = 0; i < 8; i++) {
      clouds.push({
        x: rnd(-W, W*1.5),
        y: rnd(30,150),
        speed: rnd(0.2, 0.6),
        size: rnd(60,120)
      });
    }
  }

  // handle desktop keys
  document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (gameOver && e.code === 'KeyR') init();
  });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  // handle mobile touch
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (gameOver) {
      init();
    } else if (player.onGround) {
      player.vy = jumpVel;
      player.onGround = false;
      jumpSound.currentTime = 0;
      jumpSound.play();
    }
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch((error) => {
      console.error('Service Worker registration failed:', error);
    });
  }

  let deferredPrompt;
  const installButton = document.getElementById('installButton');

  window.addEventListener('beforeinstallprompt', (event) => {
    event.preventDefault();
    deferredPrompt = event;
    installButton.classList.remove('hidden');
  });

  installButton.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const choiceResult = await deferredPrompt.userChoice;
    if (choiceResult.outcome === 'accepted') {
      installButton.textContent = 'Installed';
    }
    installButton.classList.add('hidden');
    deferredPrompt = null;
  });

  function update() {
    if (gameOver) return;

    // jump via keyboard
    if ((keys['Space'] || keys['ArrowUp']) && player.onGround) {
      player.vy = jumpVel;
      player.onGround = false;
      jumpSound.currentTime = 0;
      jumpSound.play();
    }

    // gravity & vertical movement
    player.vy += gravity;
    player.y  += player.vy;
    if (player.y >= groundY - player.h) {
      player.y = groundY - player.h;
      player.vy = 0;
      player.onGround = true;
    }

    // running animation
    if (player.onGround) {
      player.frame += player.frameDir * 0.2;
      if (player.frame > 2 || player.frame < 0) player.frameDir *= -1;
    } else {
      player.frame = 1;
    }

    // scroll everything
    holes.forEach(h=> h.x -= scrollSpeed);
    treasures.forEach(t=> { t.x -= scrollSpeed; t.angle += 0.05; });
    clouds.forEach(c=> { c.x -= c.speed; if (c.x < -c.size) c.x = W + c.size; });
    particles.forEach(p=> { p.x += p.vx; p.y += p.vy; p.alpha -= 0.02; });

    // recycle holes
    if (holes[0] && holes[0].x + holes[0].w < 0) {
      holes.shift();
      let last = holes[holes.length-1];
      let xNew = last.x + rnd(300,450),
          wNew = rnd(60,110);
      holes.push({ x: xNew, w: wNew });
      if (Math.random() < 0.4) treasures.push({ x: xNew+wNew/2, y: groundY-60, size:24, angle:0 });
    }

    // cleanup offscreen
    treasures = treasures.filter(t=> t.x + t.size > 0);
    particles  = particles.filter(p=> p.alpha > 0);

    // treasure collection
    for (let i = treasures.length-1; i >= 0; i--) {
      let t = treasures[i];
      if (
        player.x < t.x + t.size &&
        player.x + player.w > t.x &&
        player.y < t.y + t.size &&
        player.y + player.h > t.y
      ) {
        collectSound.currentTime = 0;
        collectSound.play();
        spawnParticles(t.x + t.size/2, t.y + t.size/2);
        treasures.splice(i,1);
        score++;
        ui.textContent = 'Score: ' + score;
      }
    }

    // hole collision → game over
    if (player.onGround) {
      let midX = player.x + player.w/2;
      holes.forEach(h => {
        if (midX > h.x && midX < h.x + h.w) gameOver = true;
      });
    }
  }

  function draw() {
    ctx.clearRect(0,0,W,H);

    // clouds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    clouds.forEach(c => {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.size, c.size*0.6, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // ground
    ctx.fillStyle = '#432a10';
    ctx.fillRect(0, groundY, W, 50);
    // holes
    holes.forEach(h => {
      let grd = ctx.createRadialGradient(
        h.x + h.w/2, groundY+25, 10,
        h.x + h.w/2, groundY+25, 30
      );
      grd.addColorStop(0,'#432a10');
      grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.ellipse(h.x + h.w/2, groundY+25, h.w/2, 25, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // treasures
    treasures.forEach(t => {
      ctx.save();
      ctx.translate(t.x + t.size/2, t.y + t.size/2);
      ctx.rotate(t.angle);
      ctx.shadowColor = 'gold';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffea00';
      ctx.fillRect(-t.size/2, -t.size/2, t.size, t.size);
      ctx.restore();
      ctx.shadowBlur = 0;
    });

    // particles
    particles.forEach(p => {
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // player (subtle squash)
    let pf = Math.sin(player.frame * Math.PI/2) * 0.05 + 1;
    let pw = player.w * pf, ph = player.h / pf;
    ctx.fillStyle = '#ff4500';
    ctx.beginPath();
    ctx.ellipse(
      player.x + player.w/2,
      player.y + player.h/2,
      pw/2, ph/2, 0, 0, Math.PI*2
    );
    ctx.fill();

    // game over overlay
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0,0,W,H);
      ctx.fillStyle = '#fff';
      ctx.font = '48px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', W/2, H/2 - 20);
      ctx.font = '20px monospace';
      ctx.fillText('Tap to restart', W/2, H/2 + 20);
    }
  }

  function spawnParticles(x,y) {
    for (let i = 0; i < 12; i++) {
      particles.push({
        x, y,
        vx: rnd(-2,2), vy: rnd(-3,0),
        size: rnd(2,5),
        alpha: 1,
        color: `hsl(${rnd(40,60)},100%,50%)`
      });
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // kick off
  init();
  requestAnimationFrame(loop);
  </script>
</body>
</html>

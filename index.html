<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iamcalledcharlie.com</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom CSS for the spinning globe and 3D effect */
      #globeCanvas {
        width: 100%;
        height: 100vh;
        display: block;
      }
      body {
        margin: 0;
        overflow: hidden; /* Prevent scrollbars during animation */
        min-height: 100vh;
        padding-bottom: 6rem;
      }
      .container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10; /* Ensure the content is above the canvas */
        text-align: center;
        color: white;
      }
      #title {
        font-family: 'Press Start 2P', cursive;
        font-size: 2rem;
        margin-bottom: 1rem;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      }
      #subtitle {
        font-size: 1.2rem;
        margin-bottom: 2rem;
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      }
      .cta-button {
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-family: 'Press Start 2P', cursive;
        background-color: #ffdb58; /* Yellow */
        color: #222;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s ease;
      }
      .cta-button:hover {
        background-color: #f1c232; /* Darker Yellow */
        transform: translateY(-2px);
        box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
      }
      .link-button,
      .install-button {
        color: #fff;
        text-decoration: none;
        font-family: 'Press Start 2P', cursive;
        font-size: 0.95rem;
        margin: 0.25rem;
        padding: 0.65rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background-color: rgba(255, 255, 255, 0.07);
        transition: background-color 0.25s ease, transform 0.25s ease;
        cursor: pointer;
      }
      .link-button:hover,
      .install-button:hover {
        background-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }
      .bottom-controls {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 20;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.5rem;
        padding: 1rem 0.75rem 1.25rem;
        background: rgba(0, 0, 0, 0.55);
        backdrop-filter: blur(10px);
      }
      .ad-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 30;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.85rem 1rem;
        background: rgba(255, 255, 255, 0.12);
        color: #ffffff;
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        font-family: 'Press Start 2P', cursive;
      }
      .ad-bar a {
        color: #ffdb58;
        text-decoration: none;
      }
      .ad-bar button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.4);
        color: #ffffff;
        font-family: 'Press Start 2P', cursive;
        padding: 0.4rem 0.75rem;
        border-radius: 0.5rem;
        cursor: pointer;
      }
      .ad-bar button:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .chat-widget {
        position: fixed;
        bottom: 6.5rem;
        right: 1rem;
        width: min(360px, calc(100% - 2rem));
        max-height: 420px;
        background: rgba(10, 10, 20, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 1rem;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        color: #fff;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        z-index: 40;
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .chat-widget.open {
        transform: translateY(0);
        opacity: 1;
        pointer-events: auto;
      }
      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1rem;
        background: rgba(255, 255, 255, 0.06);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .chat-header h2 {
        margin: 0;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        color: #ffdb58;
      }
      .chat-header button {
        background: transparent;
        border: none;
        color: #fff;
        font-family: 'Press Start 2P', cursive;
        font-size: 0.75rem;
        cursor: pointer;
      }
      .chat-messages {
        padding: 1rem;
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .chat-message {
        max-width: 100%;
        padding: 0.75rem 0.9rem;
        border-radius: 0.85rem;
        line-height: 1.4;
        font-size: 0.78rem;
      }
      .chat-message.user {
        background: rgba(255, 255, 255, 0.1);
        align-self: flex-end;
        color: #fff;
      }
      .chat-message.bot {
        background: rgba(255, 255, 255, 0.08);
        align-self: flex-start;
        color: #fff;
      }
      .chat-input-row {
        display: flex;
        gap: 0.5rem;
        padding: 0.85rem 1rem;
        background: rgba(255, 255, 255, 0.04);
      }
      .chat-input {
        flex: 1;
        padding: 0.75rem 0.9rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        outline: none;
        font-family: 'Press Start 2P', cursive;
        font-size: 0.75rem;
      }
      .chat-input::placeholder {
        color: rgba(255, 255, 255, 0.55);
      }
      .chat-send {
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        cursor: pointer;
        font-family: 'Press Start 2P', cursive;
      }
      .chat-send:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .hidden {
        display: none !important;
      }
    </style>
</head>
<body class="bg-black">
    <canvas id="globeCanvas"></canvas>
    <div class="container">
        <h1 id="title" class="text-yellow-400">I'm Called Charlie</h1>
        <p id="subtitle" class="text-white">Welcome to my awesome website!</p>
        <a href="#about" class="cta-button">Learn More</a>
    </div>

    <div id="adBar" class="ad-bar">
      <a href="https://getlemonz.xyz/" target="_blank" rel="noopener noreferrer">Get Lemonz today</a>
      <button id="closeAdButton" aria-label="Close ad">Close</button>
    </div>

    <div class="bottom-controls">
        <a href="#projects" class="link-button bg-blue-500/20 hover:bg-blue-500/30">Projects</a>
        <a href="#blog" class="link-button bg-green-500/20 hover:bg-green-500/30">Blog</a>
        <a href="#contact" class="link-button bg-purple-500/20 hover:bg-purple-500/30">Contact</a>
        <a href="games_landing_page.html" class="link-button bg-red-500/20 hover:bg-red-500/30">Retro Games</a>
        <button id="installButton" class="install-button hidden">Install App</button>
        <button id="openChatButton" class="link-button">Chat with chud's AI</button>
    </div>

    <div id="chatWidget" class="chat-widget" aria-live="polite">
      <div class="chat-header">
        <h2>chud's AI</h2>
        <button id="closeChatButton">Close</button>
      </div>
      <div id="chatMessages" class="chat-messages">
        <div class="chat-message bot">Hi, I'm chud's AI. Ask me anything about the site or games.</div>
      </div>
      <div class="chat-input-row">
        <input id="chatInput" class="chat-input" type="text" placeholder="Type your question..." autocomplete="off" />
        <button id="sendChatButton" class="chat-send">Send</button>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 3D Globe Animation
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('globeCanvas'), antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000); // Black background

        // Create the globe
        const globeGeometry = new THREE.SphereGeometry(5, 32, 32);
        const globeMaterial = new THREE.MeshBasicMaterial({ color: 0x4a148c, wireframe: true }); // Dark Purple Wireframe
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        scene.add(globe);

        // Add some stars for fun
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const starVertices = [];
        for (let i = 0; i < 10000; i++) {
            const x = (Math.random() - 0.5) * 2000;
            const y = (Math.random() - 0.5) * 2000;
            const z = -Math.random() * 1000;
            starVertices.push(x, y, z);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        camera.position.z = 15;

        function animate() {
            requestAnimationFrame(animate);
            globe.rotation.y += 0.005;
            stars.position.z = camera.position.z - 500; // Keep stars visible
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, newHeight);
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js').catch((error) => {
                console.error('Service Worker registration failed:', error);
            });
        }

        let deferredPrompt;
        const installButton = document.getElementById('installButton');

        window.addEventListener('beforeinstallprompt', (event) => {
            event.preventDefault();
            deferredPrompt = event;
            installButton.classList.remove('hidden');
        });

        installButton.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const choiceResult = await deferredPrompt.userChoice;
            if (choiceResult.outcome === 'accepted') {
                installButton.textContent = 'Installed';
            }
            installButton.classList.add('hidden');
            deferredPrompt = null;
        });

        const adBar = document.getElementById('adBar');
        const closeAdButton = document.getElementById('closeAdButton');

        if (closeAdButton && adBar) {
            closeAdButton.addEventListener('click', () => {
                adBar.classList.add('hidden');
            });
        }

        const chatWidget = document.getElementById('chatWidget');
        const openChatButton = document.getElementById('openChatButton');
        const closeChatButton = document.getElementById('closeChatButton');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendChatButton = document.getElementById('sendChatButton');

        function addChatMessage(text, sender) {
            const message = document.createElement('div');
            message.className = `chat-message ${sender}`;
            message.textContent = text;
            chatMessages.appendChild(message);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function parseMathExpression(text) {
            const replaced = text
                .replace(/×/g, '*')
                .replace(/÷/g, '/')
                .replace(/mod/gi, '%')
                .replace(/\^/g, '**');

            const matches = replaced.match(/[0-9.+\-*/%^()\s]+/g);
            if (!matches) return null;

            const expression = matches.sort((a, b) => b.length - a.length)[0].trim();
            if (!expression || /[^0-9+\-*/%^().\s]/.test(expression)) {
                return null;
            }

            try {
                const result = Function(`"use strict"; return (${expression});`)();
                if (typeof result === 'number' && Number.isFinite(result)) {
                    return Number.isInteger(result) ? result : parseFloat(result.toFixed(6));
                }
            } catch (error) {
                return null;
            }
            return null;
        }

        function getChudsReply(text) {
            const trimmed = text.trim();
            if (!trimmed) return 'Type a question and I will answer it.';
            const lower = trimmed.toLowerCase();

            const mathResult = parseMathExpression(lower);
            if (mathResult !== null) {
                return `Sure, ${trimmed} = ${mathResult}`;
            }

            if (/\b(hi|hello|hey|yo)\b/.test(lower)) {
                return 'Hey there! I am chud\'s AI. Ask me about the site, games, or math problems.';
            }
            if (/\b(name|who are you)\b/.test(lower)) {
                return 'I am chud\'s AI, your friendly website chat helper that can also do math.';
            }
            if (/\b(game|play|fun|retro|games)\b/.test(lower)) {
                return 'You can play games from the Retro Games link at the bottom or browse the site sections above.';
            }
            if (/\b(lemonz|lemon)\b/.test(lower)) {
                return 'Want Lemonz? Click the top ad or visit https://getlemonz.xyz/.';
            }
            if (/\b(help|need|how do i|what can i|do everything|everything|can you do)\b/.test(lower)) {
                return 'I can do math, answer questions about this site, help you find games, and assist with general page info. Ask me anything!';
            }
            if (/\b(thanks|thank you)\b/.test(lower)) {
                return 'You\'re welcome! Ask me another question if you want.';
            }
            return 'I can help with math problems, site navigation, and game info. Try asking me something like "What is 12 * 8?" or "Where are the games?"';
        }

        function sendChat() {
            const value = chatInput.value.trim();
            if (!value) return;
            addChatMessage(value, 'user');
            chatInput.value = '';
            const reply = getChudsReply(value);
            setTimeout(() => {
                addChatMessage(reply, 'bot');
            }, 200);
        }

        if (openChatButton && chatWidget) {
            openChatButton.addEventListener('click', () => {
                chatWidget.classList.add('open');
                chatInput.focus();
            });
        }

        if (closeChatButton && chatWidget) {
            closeChatButton.addEventListener('click', () => {
                chatWidget.classList.remove('open');
            });
        }

        if (sendChatButton) {
            sendChatButton.addEventListener('click', sendChat);
        }

        if (chatInput) {
            chatInput.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    sendChat();
                }
            });
        }
    </script>
</body>
</html>
